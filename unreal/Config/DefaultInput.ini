[/Script/Engine.InputSettings]
; Enhanced Input drives all gameplay actions. The legacy action/axis mappings
; below are intentionally empty — bindings live in Enhanced Input assets:
;   IMC_Campus (UInputMappingContext) maps keys/gamepad to:
;   IA_Move (Axis2D), IA_Look (Axis2D), IA_Jump (Bool), IA_Sprint (Bool),
;   IA_Interact (Bool), IA_ToggleView (Bool).
; The pawn injects IMC_Campus and the controller adds it on possession.
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent
bEnableMouseSmoothing=False
bCaptureMouseOnLaunch=True

[/Script/EnhancedInput.EnhancedInputDeveloperSettings]
bEnableUserSettings=True
