; Collective AI Inc. — Mega Campus

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/Maps/Campus.Campus
EditorStartupMap=/Game/Maps/Campus.Campus
GlobalDefaultGameMode=/Script/CollectiveCampus.CampusGameMode

[/Script/Engine.RendererSettings]
; Lumen global illumination + reflections (UE5 default dynamic GI).
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.Lumen.HardwareRayTracing=False
; Nanite virtualized geometry for the imported building meshes.
r.Nanite.ProjectEnabled=True
r.RayTracing=False
; Virtual shadow maps pair with Lumen/Nanite.
r.Shadow.Virtual.Enable=1
r.GenerateMeshDistanceFields=True
r.DefaultFeature.AutoExposure.Method=0
DefaultFeatureAutoExposure=False

[/Script/WorldPartitionEditor.WorldPartitionEditorSettings]
; The campus is ~1.1 km x 0.66 km — well suited to World Partition streaming.
; Author the persistent level as a World Partition map (New Level > Empty Open World)
; so the 30 buildings stream by distance via runtime grids / HLODs.
CommandletClass=Class'/Script/UnrealEd.WorldPartitionConvertCommandlet'

[/Script/Engine.PhysicsSettings]
DefaultGravityZ=-980.0
